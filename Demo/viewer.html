<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InfoDoc</title>
    <link rel="icon" href="./favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./style_iframe.css">
</head>
<body onauxclick="return false" oncontextmenu="return false">
    <header class="toolbar">
        <button onclick="history.back()">Назад</button>
        <button onclick="history.forward()">Вперед</button>
        <button onclick="location.href='./index.htm'">Домой</button>
        <input type="text" id="searchInput" placeholder="Поиск по странице..." />
        <button onclick="searchText()">Поиск</button>
        <button onclick="clearSearchBatton()">Очистить</button>
    </header>

    <main id="content">
        <iframe id="docFrame" src="" style="width:100%; height:100vh; border:none;"></iframe>
    </main>

    <script src="./js/System_limitations.js" defer></script>
    <script src="./js/link_handler.js" defer></script>
    <script src="./js/OOP_function_viewer.js" defer></script>
</body>
</html>
