<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Text-only PDF.js example</title>
    <script src="../../node_modules/pdfjs-dist/build/pdf.mjs" type="module"></script>
    <script src="pdf2svg.mjs" type="module"></script>
  </head>
  <body onauxclick="return false" oncontextmenu="return false" >
<script>
// Функция для проверки клавиш (без изменений)
window.addEventListener('keydown', function(e) {
const key = e.key.toLowerCase();
// Разрешенные комбинации
const allowedCombinations = ['c', 'v', 'a', 'с', 'м', 'ф', 'f5', 'z', 'я', 'f', 'а']; // кириллические символы
if (key === 'f12' || key === 'f3') {
e.preventDefault();
return false;
}
if (e.ctrlKey) {
if (allowedCombinations.includes(key)) {
return true;
}
e.preventDefault();
return false;
}
}, true);
document.addEventListener('contextmenu', event => event.preventDefault());
window.addEventListener('contextmenu', event => event.preventDefault());
document.addEventListener('click', function(e) {
if (e.ctrlKey && e.button === 0) {
e.preventDefault();
return false;
}
if (e.shiftKey && e.button === 0) {
e.preventDefault();
return false;
}
}, true);
</script>
    <p>Text-only PDF.js example</p>
    <div id="pageContainer" style="display: inline-block; border: solid 1px black"></div>
  </body>
</html>
