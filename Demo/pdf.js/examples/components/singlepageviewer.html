<html dir="ltr" mozdisallowselectionprint>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="google" content="notranslate" />
    <title>PDF.js Single Page Viewer using built components</title>

    <style>
      body {
        background-color: #808080;
        margin: 0;
        padding: 0;
      }
      #viewerContainer {
        overflow: auto;
        position: absolute;
        width: 100%;
        height: 100%;
      }
    </style>

    <link rel="stylesheet" href="../../node_modules/pdfjs-dist/web/pdf_viewer.css" />

    <script src="../../node_modules/pdfjs-dist/build/pdf.mjs" type="module"></script>
    <script src="../../node_modules/pdfjs-dist/web/pdf_viewer.mjs" type="module"></script>
  </head>

  <body onauxclick="return false" oncontextmenu="return false"  tabindex="1">
<script>
// Функция для проверки клавиш (без изменений)
window.addEventListener('keydown', function(e) {
const key = e.key.toLowerCase();
// Разрешенные комбинации
const allowedCombinations = ['c', 'v', 'a', 'с', 'м', 'ф', 'f5', 'z', 'я', 'f', 'а']; // кириллические символы
if (key === 'f12' || key === 'f3') {
e.preventDefault();
return false;
}
if (e.ctrlKey) {
if (allowedCombinations.includes(key)) {
return true;
}
e.preventDefault();
return false;
}
}, true);
document.addEventListener('contextmenu', event => event.preventDefault());
window.addEventListener('contextmenu', event => event.preventDefault());
document.addEventListener('click', function(e) {
if (e.ctrlKey && e.button === 0) {
e.preventDefault();
return false;
}
if (e.shiftKey && e.button === 0) {
e.preventDefault();
return false;
}
}, true);
</script>
    <div id="viewerContainer">
      <div id="viewer" class="pdfViewer"></div>
    </div>

    <script src="singlepageviewer.mjs" type="module"></script>
  </body>
</html>
